<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STRATUM | Beneficial Ownership Intelligence</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%234338ca'/%3E%3Cstop offset='100%25' stop-color='%237c3aed'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='7' fill='url(%23g)'/%3E%3Crect x='6' y='7' width='20' height='4' rx='2' fill='white'/%3E%3Crect x='6' y='14' width='20' height='4' rx='2' fill='white' opacity='.75'/%3E%3Crect x='6' y='21' width='20' height='4' rx='2' fill='white' opacity='.45'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'Menlo', 'monospace'],
          },
        },
      },
    }
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
  <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    #root { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    #cy { width: 100%; height: 100%; }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

    .graph-bg {
      background-color: #fafafa;
      background-image:
        linear-gradient(rgba(148,163,184,0.09) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148,163,184,0.09) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .panel-slide {
      animation: panelSlideIn 0.22s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes panelSlideIn {
      from { transform: translateX(24px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    .loading-bar {
      position: fixed; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, #4338ca, #7c3aed, #06b6d4);
      background-size: 200% 100%;
      animation: loadSlide 1.6s linear infinite;
      z-index: 9999;
    }
    @keyframes loadSlide { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

    /* Interactive element micro-interactions */
    .hover-lift { transition: transform 0.12s ease, box-shadow 0.12s ease; }
    .hover-lift:hover { transform: translateY(-1px); }
    .hover-lift:active { transform: translateY(0) scale(0.98); }

    .btn-icon { transition: background 0.1s ease, color 0.1s ease; }
    .btn-icon:hover { background: #f1f5f9 !important; color: #1e293b !important; }
    .btn-icon:active { background: #e2e8f0 !important; }

    /* Smooth flag card transitions */
    .flag-card { transition: box-shadow 0.15s ease, border-color 0.15s ease, transform 0.12s ease; }
    .flag-card:hover:not(.flag-card-active) { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(15,23,42,0.08) !important; }

    /* Pulsing dot for WS live indicator */
    @keyframes ping { 75%, 100% { transform: scale(1.8); opacity: 0; } }
    .ws-ping { animation: ping 1.5s cubic-bezier(0,0,0.2,1) infinite; }
  </style>
</head>
<body class="antialiased bg-slate-50">
  <div id="root"></div>
  <script type="text/babel" src="app.js"></script>
</body>
</html>
